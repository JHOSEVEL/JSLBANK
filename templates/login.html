<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JSLBank - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-sm border border-slate-800 shadow-2xl">
        <h2 class="text-2xl font-bold text-cyan-400 mb-6 text-center">Acesse o JSLBank</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                {% if category == 'error' %}
                <div class="bg-red-500/10 text-red-400 p-3 rounded-lg text-xs mb-4 border border-red-500/20 text-center">{{ message }}</div>
                {% else %}
                <div class="bg-green-500/10 text-green-400 p-3 rounded-lg text-xs mb-4 border border-green-500/20 text-center">{{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
            <div><label class="text-xs font-medium text-slate-400">E-mail</label><input type="email" name="email" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 mt-1 focus:border-cyan-500 outline-none"></div>
            <div><label class="text-xs font-medium text-slate-400">Senha</label><input type="password" name="senha" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 mt-1 focus:border-cyan-500 outline-none"></div>
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold p-3 rounded-lg mt-2 transition">Acessar Conta</button>
        </form>
        <p class="text-center text-xs text-slate-500 mt-4">Novo por aqui? <a href="{{ url_for('cadastro') }}" class="text-cyan-400 hover:underline">Abra sua conta</a></p>
    </div>
</body>
</html>
